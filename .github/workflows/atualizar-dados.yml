name: Atualizar dados — Cofre Aberto MS

on:
  schedule:
    # Roda todo dia às 9h UTC (6h BRT)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Permite rodar manualmente

permissions:
  contents: write

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    name: Coletar e atualizar dados

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Coletar dados das APIs públicas
        run: python scripts/coletar_dados.py

      - name: Reconstruir HTML com dados atualizados
        run: python scripts/rebuild_html.py

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/ cofre-aberto-ms.html index.html
          git diff --staged --quiet || git commit -m "chore: atualizar dados automático $(date +'%Y-%m-%d %H:%M')"
          git push
